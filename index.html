<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ねこ育成ゲーム</title>

<style>

body{
font-family:sans-serif;
background:#ffeef5;
text-align:center;
}

.game{
background:white;
width:460px;
margin:30px auto;
padding:20px;
border-radius:20px;
box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

h1{
color:#ff6fa8;
}

/* 猫 */

.cat{
position:relative;
width:120px;
height:120px;
margin:20px auto;
background:#fff;
border-radius:50%;
border:4px solid #444;
}

.ear{
position:absolute;
width:40px;
height:40px;
background:#fff;
border:4px solid #444;
top:-20px;
transform:rotate(45deg);
}

.ear.left{left:10px;}
.ear.right{right:10px;}

.eye{
position:absolute;
width:12px;
height:12px;
background:#333;
border-radius:50%;
top:45px;
}

.eye.left{left:35px;}
.eye.right{right:35px;}

.mouth{
position:absolute;
width:20px;
height:10px;
border-bottom:3px solid #333;
border-radius:0 0 20px 20px;
bottom:30px;
left:50%;
transform:translateX(-50%);
}

/* ステータスバー */

.bar{
height:18px;
background:#eee;
border-radius:10px;
margin:8px 0;
}

.fill{
height:100%;
background:#7ed957;
border-radius:10px;
}

button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:10px;
background:#ff8fb1;
color:white;
cursor:pointer;
}

button:hover{
background:#ff6fa8;
}

.shop{
background:#fff6fb;
margin-top:15px;
padding:10px;
border-radius:10px;
}

#minigame{
display:none;
margin-top:10px;
}

.ball{
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="game">

<h1>🐱ねこ育成ゲーム</h1>

<h2 id="catName">ねこ</h2>

<div class="cat">
<div class="ear left"></div>
<div class="ear right"></div>
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth"></div>
</div>

<p>レベル: <span id="level">1</span></p>
<p>コイン: <span id="coins">10</span> 🪙</p>
<p>ごはん在庫: <span id="food">3</span> 🍗</p>

<p>おなか</p>
<div class="bar"><div id="hunger" class="fill" style="width:80%"></div></div>

<p>元気</p>
<div class="bar"><div id="happy" class="fill" style="width:80%"></div></div>

<p>経験値</p>
<div class="bar"><div id="exp" class="fill" style="width:0%"></div></div>

<button onclick="feed()">🍗ごはん</button>
<button onclick="play()">🎾あそぶ</button>
<button onclick="sleep()">💤ねる</button>

<p id="message">ねこは元気です</p>

<div class="shop">

<h3>🛒おみせ</h3>

<button onclick="buyFood()">ごはん購入(5コイン)</button>

</div>

<button onclick="startMiniGame()">🎮コインミニゲーム</button>

<div id="minigame">

<p>ボールをクリック！(10秒)</p>

<div id="ball" class="ball" onclick="hitBall()">⚽</div>

<p>スコア: <span id="score">0</span></p>

</div>

</div>

<script>

let hunger=80
let happy=80
let exp=0
let level=1
let coins=10
let food=3

let score=0
let gameTime=0
let gameTimer

function update(){

document.getElementById("hunger").style.width=hunger+"%"
document.getElementById("happy").style.width=happy+"%"
document.getElementById("exp").style.width=exp+"%"

document.getElementById("coins").textContent=coins
document.getElementById("level").textContent=level
document.getElementById("food").textContent=food

}

function gainExp(v){

exp+=v

if(exp>=100){
exp=0
level++
coins+=10
document.getElementById("message").textContent="レベルアップ！"
}

}

function feed(){

if(food<=0){
document.getElementById("message").textContent="ごはんがありません！"
return
}

food--

hunger+=20
if(hunger>100) hunger=100

gainExp(10)

document.getElementById("message").textContent="ねこはごはんを食べた！"

update()

}

function play(){

happy+=15
hunger-=5

gainExp(15)

coins+=1

document.getElementById("message").textContent="ねこは遊んだ！"

update()

}

function sleep(){

happy+=5
hunger-=5

gainExp(5)

document.getElementById("message").textContent="ねこは寝ている"

update()

}

function buyFood(){

if(coins>=5){

coins-=5
food++

document.getElementById("message").textContent="ごはんを買いました"

}else{

document.getElementById("message").textContent="コインが足りません"

}

update()

}

/* ミニゲーム */

function startMiniGame(){

score=0
gameTime=10

document.getElementById("score").textContent=score
document.getElementById("minigame").style.display="block"

gameTimer=setInterval(()=>{

gameTime--

moveBall()

if(gameTime<=0){

clearInterval(gameTimer)

coins+=score

document.getElementById("message").textContent="ミニゲーム終了！ "+score+"コインゲット！"

document.getElementById("minigame").style.display="none"

update()

}

},1000)

}

function hitBall(){

score++
document.getElementById("score").textContent=score

moveBall()

}

function moveBall(){

let ball=document.getElementById("ball")

let x=Math.random()*200-100
let y=Math.random()*50

ball.style.transform="translate("+x+"px,"+y+"px)"

}

setInterval(()=>{

hunger-=2
happy-=1

if(hunger<0) hunger=0
if(happy<0) happy=0

update()

},4000)

update()

</script>

</body>
</html>
