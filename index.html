<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超本格ねこゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
transition:background 1s;
background:#87ceeb;
}

.game{
width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.cat{
font-size:100px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.bar{
height:18px;
background:#eee;
border-radius:10px;
margin:5px;
}

.fill{
height:100%;
background:#6fd96f;
border-radius:10px;
}

button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:10px;
background:#ff7fab;
color:white;
cursor:pointer;
}

button:hover{
background:#ff5f9a;
}

.room{
margin-top:10px;
padding:10px;
border-radius:10px;
background:#ffeef5;
}

.furniture{
font-size:30px;
margin:5px;
}

#fishGame{
display:none;
margin-top:15px;
}

.fish{
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="game">

<h1>🐱 超本格ねこゲーム</h1>

<p>天気 <span id="weather">☀️</span></p>

<div id="cat" class="cat">🐱</div>

<p>
名前:
<input id="nameInput">
<button onclick="setName()">決定</button>
</p>

<h2 id="catName">ねこ</h2>

<p>レベル <span id="level">1</span></p>
<p>コイン <span id="coins">10</span> 🪙</p>
<p>ごはん <span id="food">3</span> 🍗</p>

<p>おなか</p>
<div class="bar"><div id="hunger" class="fill" style="width:80%"></div></div>

<p>元気</p>
<div class="bar"><div id="happy" class="fill" style="width:80%"></div></div>

<button onclick="feed()">🍗 ごはん</button>
<button onclick="play()">🎾 遊ぶ</button>
<button onclick="sleep()">💤 寝る</button>

<p id="msg"></p>

<h3>🏠 部屋</h3>

<div class="room" id="room"></div>

<button onclick="buyBed()">🛏 ベッド (20)</button>
<button onclick="buyToy()">🧸 おもちゃ (10)</button>

<h3>🐟 魚釣りゲーム</h3>

<button onclick="startFish()">釣りをする</button>

<div id="fishGame">

<div id="fish" class="fish" onclick="catchFish()">🐟</div>

<p>スコア <span id="score">0</span></p>

</div>

</div>

<script>

let game={
name:"ねこ",
level:1,
coins:10,
food:3,
hunger:80,
happy:80,
furniture:[]
}

let score=0

function update(){

document.getElementById("catName").textContent=game.name
document.getElementById("level").textContent=game.level
document.getElementById("coins").textContent=game.coins
document.getElementById("food").textContent=game.food

document.getElementById("hunger").style.width=game.hunger+"%"
document.getElementById("happy").style.width=game.happy+"%"

updateCat()
drawRoom()

save()

}

function updateCat(){

let cat=document.getElementById("cat")

if(game.level<5) cat.textContent="🐱"
else if(game.level<10) cat.textContent="🐈"
else cat.textContent="🦁"

}

function msg(t){

document.getElementById("msg").textContent=t

}

function setName(){

let n=document.getElementById("nameInput").value

if(n){
game.name=n
update()
}

}

function feed(){

if(game.food<=0){
msg("ごはんがありません")
return
}

game.food--
game.hunger+=20
if(game.hunger>100)game.hunger=100

gain()

msg("ごはんを食べた")

update()

}

function play(){

game.happy+=15
game.coins+=1

gain()

msg("楽しく遊んだ")

update()

}

function sleep(){

game.happy+=5
msg("ぐっすり寝た")

update()

}

function gain(){

if(Math.random()<0.3){

game.level++
msg("レベルアップ！")

}

}

function buyBed(){

if(game.coins>=20){

game.coins-=20
game.furniture.push("bed")

update()

}

}

function buyToy(){

if(game.coins>=10){

game.coins-=10
game.furniture.push("toy")

update()

}

}

function drawRoom(){

let room=document.getElementById("room")

room.innerHTML=""

game.furniture.forEach(f=>{

let el=document.createElement("span")

if(f=="bed") el.textContent="🛏"
if(f=="toy") el.textContent="🧸"

el.className="furniture"

room.appendChild(el)

})

}

function startFish(){

score=0

document.getElementById("score").textContent=0
document.getElementById("fishGame").style.display="block"

moveFish()

}

function catchFish(){

score++
game.coins++

document.getElementById("score").textContent=score

moveFish()

}

function moveFish(){

let fish=document.getElementById("fish")

let x=Math.random()*300-150
let y=Math.random()*80

fish.style.transform="translate("+x+"px,"+y+"px)"

}

setInterval(moveFish,1200)

/* 天気 */

function updateWeather(){

let r=Math.random()

let w=document.getElementById("weather")

if(r<0.5) w.textContent="☀️"
else if(r<0.8) w.textContent="☁️"
else w.textContent="🌧"

}

setInterval(updateWeather,20000)

/* 昼夜 */

setInterval(()=>{

let hour=new Date().getHours()

if(hour>=18 || hour<6)
document.body.style.background="#1e2a44"
else
document.body.style.background="#87ceeb"

},5000)

/* ステータス減少 */

setInterval(()=>{

game.hunger-=2
game.happy-=1

if(game.hunger<0)game.hunger=0
if(game.happy<0)game.happy=0

update()

},5000)

/* セーブ */

function save(){

localStorage.setItem("supercat",JSON.stringify(game))

}

function load(){

let data=localStorage.getItem("supercat")

if(data){

game=JSON.parse(data)

}

}

load()
update()

</script>

</body>
</html>
