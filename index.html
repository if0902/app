<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ねこ育成ゲームPRO+</title>

<style>

body{
font-family:sans-serif;
background:#87ceeb;
transition:background 1s;
text-align:center;
}

.game{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.cat{
font-size:90px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.bar{
height:20px;
background:#eee;
border-radius:10px;
margin:5px;
}

.fill{
height:100%;
background:#6fd96f;
border-radius:10px;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:10px;
background:#ff7fab;
color:white;
cursor:pointer;
}

button:hover{
background:#ff5f9a;
}

#fishGame{
margin-top:15px;
display:none;
background:#e8f9ff;
padding:10px;
border-radius:10px;
}

#fish{
font-size:40px;
cursor:pointer;
display:inline-block;
transition:transform 0.5s;
}

</style>
</head>

<body>

<div class="game">

<h1>🐱ねこ育成ゲームPRO+</h1>

<div id="cat" class="cat">🐱</div>

<p>名前: <input id="nameInput">
<button onclick="setName()">決定</button></p>

<h2 id="catName">ねこ</h2>

<p>レベル <span id="level">1</span></p>
<p>コイン <span id="coins">0</span></p>
<p>フード 🍖 <span id="food">0</span></p>

<p>おなか</p>
<div class="bar"><div id="hunger" class="fill" style="width:80%"></div></div>

<p>元気</p>
<div class="bar"><div id="happy" class="fill" style="width:80%"></div></div>

<button onclick="feed()">ごはん</button>
<button onclick="play()">遊ぶ</button>
<button onclick="sleep()">寝る</button>
<button onclick="buyFood()">フード購入(5コイン)</button>
<button onclick="openFish()">魚つり</button>

<p id="msg"></p>

<div id="fishGame">

<p>🐟魚をクリックしてフードゲット！</p>

<div id="fish">🐟</div>

<br>
<button onclick="closeFish()">やめる</button>

</div>

</div>

<script>

let game={
name:"ねこ",
hunger:80,
happy:80,
coins:10,
food:3,
level:1
}

function update(){

document.getElementById("hunger").style.width=game.hunger+"%"
document.getElementById("happy").style.width=game.happy+"%"

document.getElementById("coins").textContent=game.coins
document.getElementById("food").textContent=game.food
document.getElementById("level").textContent=game.level
document.getElementById("catName").textContent=game.name

save()

}

function feed(){

if(game.food<=0){
msg("フードがない！")
return
}

game.food--
game.hunger+=20

if(game.hunger>100)game.hunger=100

msg("ごはんを食べた！")

update()

}

function play(){

game.happy+=20
game.coins+=2

if(game.happy>100)game.happy=100

msg("楽しく遊んだ！")

update()

}

function sleep(){

game.happy+=5
msg("ぐっすり寝た")

update()

}

function buyFood(){

if(game.coins<5){
msg("コインが足りない！")
return
}

game.coins-=5
game.food+=3

msg("フードを買った！")

update()

}

function setName(){

let n=document.getElementById("nameInput").value

if(n){
game.name=n
update()
}

}

function msg(t){

document.getElementById("msg").textContent=t

}

/* 魚ミニゲーム */

function openFish(){

document.getElementById("fishGame").style.display="block"

}

function closeFish(){

document.getElementById("fishGame").style.display="none"

}

function catchFish(){

game.food+=1
game.coins+=1

msg("魚ゲット！フード+1")

update()

}

document.getElementById("fish").onclick=catchFish

function fishMove(){

let fish=document.getElementById("fish")

let x=Math.random()*200-100

fish.style.transform="translateX("+x+"px)"

}

setInterval(fishMove,1000)

/* 昼夜 */

setInterval(()=>{

let hour=new Date().getHours()

if(hour>=18 || hour<6){

document.body.style.background="#1e2a44"

}else{

document.body.style.background="#87ceeb"

}

},5000)

/* セーブ */

function save(){

localStorage.setItem("catgame",JSON.stringify(game))

}

function load(){

let data=localStorage.getItem("catgame")

if(data){

game=JSON.parse(data)

}

}

load()
update()

</script>

</body>
</html>
