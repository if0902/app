<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ふうみのねこゲーム</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(#87CEEB,#e0f7ff);
text-align:center;
margin:0;
}

#game{
max-width:700px;
margin:auto;
padding:20px;
}

#room{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
margin-top:20px;
}

#cat{
font-size:120px;
transition:transform 1s;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:10px;
background:#ff9ecb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff7fb8;
}

#fishGame{
display:none;
margin-top:20px;
background:#d8f4ff;
padding:20px;
border-radius:20px;
}

#fish{
font-size:50px;
position:relative;
cursor:pointer;
}

.night{
background:linear-gradient(#001848,#030d2c);
color:white;
}

</style>
</head>

<body>

<div id="game">

<h1>🐱 ふうみのねこゲーム</h1>

<p>
レベル <span id="level">1</span> |
コイン <span id="coins">0</span>
</p>

<p>
おなか <span id="hunger">80</span> |
しあわせ <span id="happy">80</span>
</p>

<p>時間 <span id="time">昼</span></p>

<div id="room">

<div id="cat">🐱</div>

<div>
<button onclick="feed()">🍖 ごはん</button>
<button onclick="play()">🎾 あそぶ</button>
<button onclick="sleep()">😴 ねる</button>
<button onclick="openFish()">🐟 つり</button>
</div>

</div>

<div id="fishGame">

<h2>🐟 魚釣りミニゲーム</h2>
<p>魚をクリック！</p>

<div id="fish">🐟</div>

<button onclick="closeFish()">やめる</button>

</div>

</div>

<script>

let game=JSON.parse(localStorage.getItem("catgame"))||{

coins:0,
hunger:80,
happy:80,
level:1,
exp:0,
time:12,
stage:0

}

function save(){

localStorage.setItem("catgame",JSON.stringify(game))

}

function updateUI(){

document.getElementById("coins").textContent=game.coins
document.getElementById("hunger").textContent=game.hunger
document.getElementById("happy").textContent=game.happy
document.getElementById("level").textContent=game.level

let cat=document.getElementById("cat")

if(game.stage==0) cat.textContent="🐱"
if(game.stage==1) cat.textContent="😺"
if(game.stage==2) cat.textContent="😸"

if(game.time>=6 && game.time<18){
document.body.classList.remove("night")
document.getElementById("time").textContent="昼"
}else{
document.body.classList.add("night")
document.getElementById("time").textContent="夜"
}

}

function gainExp(n){

game.exp+=n

if(game.exp>=10){

game.exp=0
game.level++

if(game.level==5) game.stage=1
if(game.level==10) game.stage=2

}

}

function feed(){

if(game.coins<1){
alert("コインがない！")
return
}

game.coins--
game.hunger+=20

if(game.hunger>100) game.hunger=100

gainExp(2)
save()
updateUI()

}

function play(){

game.happy+=15
game.hunger-=10

gainExp(2)

save()
updateUI()

}

function sleep(){

game.happy+=5
game.time+=6

if(game.time>=24) game.time-=24

save()
updateUI()

}

function openFish(){

document.getElementById("fishGame").style.display="block"

}

function closeFish(){

document.getElementById("fishGame").style.display="none"

}

function catchFish(){

game.coins+=3
gainExp(3)

save()
updateUI()

}

document.getElementById("fish").onclick=catchFish

function fishMove(){

let fish=document.getElementById("fish")

let x=Math.random()*200-100
let y=Math.random()*60

fish.style.transform="translate("+x+"px,"+y+"px)"

}

setInterval(fishMove,1000)

function catMove(){

let cat=document.getElementById("cat")

let x=Math.random()*60-30

cat.style.transform="translateX("+x+"px)"

}

setInterval(catMove,3000)

function decay(){

game.hunger-=1
game.happy-=1

if(game.hunger<0) game.hunger=0
if(game.happy<0) game.happy=0

updateUI()
save()

}

setInterval(decay,5000)

updateUI()

</script>

</body>
</html>
