<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ねこを育てよう！</title>

<style>
body{
    font-family:sans-serif;
    background:#ffeef5;
    text-align:center;
}

.game{
    background:white;
    width:380px;
    margin:40px auto;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.cat{
    font-size:80px;
    transition: transform 0.2s;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#ff8fb1;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff6f9c;
}

.bar{
    height:20px;
    background:#eee;
    border-radius:10px;
    margin:10px 0;
}

.fill{
    height:100%;
    background:#7ed957;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="game">

<h1>🐱 ねこを育てよう！</h1>

<div id="cat" class="cat">😺</div>

<p>おなか</p>
<div class="bar">
<div id="hunger" class="fill" style="width:80%"></div>
</div>

<p>元気</p>
<div class="bar">
<div id="happy" class="fill" style="width:80%"></div>
</div>

<button onclick="feed()">🍣 ごはん</button>
<button onclick="play()">🎾 あそぶ</button>
<button onclick="sleep()">💤 ねる</button>

<p id="message">ねこは元気です！</p>

</div>

<script>

let hunger = 80;
let happy = 80;

function updateBars(){
    document.getElementById("hunger").style.width = hunger + "%";
    document.getElementById("happy").style.width = happy + "%";
}

function feed(){
    hunger += 15;
    if(hunger > 100) hunger = 100;
    document.getElementById("message").textContent = "ねこはごはんを食べました！";
    bounce();
    updateBars();
}

function play(){
    happy += 15;
    hunger -= 5;
    if(happy > 100) happy = 100;
    document.getElementById("message").textContent = "ねこは楽しく遊びました！";
    bounce();
    updateBars();
}

function sleep(){
    happy += 5;
    hunger -= 5;
    document.getElementById("message").textContent = "ねこはぐっすり寝ました";
    bounce();
    updateBars();
}

function bounce(){
    const cat = document.getElementById("cat");
    cat.style.transform = "scale(1.2)";
    setTimeout(()=>{
        cat.style.transform = "scale(1)";
    },200);
}

setInterval(()=>{
    hunger -= 2;
    happy -= 1;

    if(hunger < 0) hunger = 0;
    if(happy < 0) happy = 0;

    if(hunger < 30){
        document.getElementById("message").textContent = "おなかがすいています！";
    }

    if(happy < 30){
        document.getElementById("message").textContent = "あそびたそうです！";
    }

    updateBars();

},4000);

</script>

</body>
</html>
